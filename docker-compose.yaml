
services:
  web:
    build:
      context: .
    command: sh -c "python manage.py makemigrations && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "7001:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - db
      - redis

  db:
    image: postgres:14
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    volumes:
      - redis-data:/data
  
  celery_worker:
    build:
      context: .
    command: celery -A shop worker --loglevel=info
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - redis
  
  celery_beat:
    build:
      context: .
    command: celery -A shop beat --loglevel=info
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - redis

  celery_flower:
    build:
      context: .
    command: celery -A shop flower --loglevel=info
    ports:
      - "8591:5555"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - redis

volumes:
  db-data:
  redis-data: